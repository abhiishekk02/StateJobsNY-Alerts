name: NY State Job Alert

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ny-state-job-alert
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install application
        run: pip install --requirement requirements.txt .

      - name: Monitor vacancies and send alerts
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python -m job_alert --config config/config.yaml

      - name: Upload execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-alert-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14

      - name: Persist emailed vacancy IDs
        run: |
          if git diff --quiet -- data/seen_jobs.json; then
            echo "No state changes to persist."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen_jobs.json
          git commit -m "chore: record emailed job vacancies [skip ci]"
          git push

